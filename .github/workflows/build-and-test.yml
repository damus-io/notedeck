name: Test

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      additional-setup:
        required: false
        type: string

jobs:
  run:
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Additional Setup (if specified)
        if: ${{ inputs.additional-setup != '' }}
        run: ${{ inputs.additional-setup }}

      - name: Run Tests (Native Only)
        run: cargo test --workspace --exclude notedeck_messages
        env:
          CI: true

      - name: Run notedeck_messages Unit Tests
        run: cargo test -p notedeck_messages --lib
        env:
          CI: true

      - name: Run notedeck_messages E2E Tests
        run: cargo test -p notedeck_messages --test messages_e2e -- --test-threads=1
        env:
          CI: true
