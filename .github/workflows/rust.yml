name: CI

on:
  push:
    branches:
      - master
      - ci
  pull_request:
    branches:
      - "*"
  release:
    types: [published]

jobs:
  changelog-check:
    name: Changelog Trailers
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commits for Changelog trailers
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          fail=0
          for sha in $(git rev-list "$base".."$head"); do
            msg=$(git log -1 --format="%B" "$sha")
            # Skip merge commits
            if echo "$msg" | head -1 | grep -qE '^Merge '; then
              continue
            fi
            if ! echo "$msg" | grep -qE '^Changelog-(Added|Changed|Fixed|Removed|None):'; then
              echo "FAIL: Commit $sha is missing a Changelog trailer:"
              echo "$msg" | head -5
              echo "---"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then
            echo ""
            echo "Every commit must have a Changelog-{Added,Changed,Fixed,Removed,None} trailer."
            exit 1
          fi

  lint:
    name: Rustfmt + Clippy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: |
          cargo fmt --all -- --check
          cargo clippy

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo audit --deny warnings

  android:
    name: Check (android)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Setup Java JDK
        uses: actions/setup-java@v4.5.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Add android rust target
        run: rustup target add aarch64-linux-android
      - name: Install Cargo NDK
        run: cargo install cargo-ndk
      - name: Run tests
        run: make jni-check

  linux-test:
    name: Test (Linux)
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: ubuntu-22.04
      additional-setup: |
        sudo apt-get install libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libspeechd-dev libxkbcommon-dev libssl-dev libasound2-dev

  snapshot-test:
    name: Snapshot Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libspeechd-dev libxkbcommon-dev libssl-dev libasound2-dev mesa-vulkan-drivers
      - name: Run snapshot tests
        run: ./scripts/snapshot-test

  macos-test:
    name: Test (macOS)
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: macos-latest

  windows-test:
    name: Test (Windows)
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: windows-latest

  packaging:
    name: rpm/deb
    runs-on: ubuntu-22.04
    needs: linux-test
    if: github.ref_name == 'master' || github.ref_name == 'ci' || github.event_name == 'release'

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    env:
      PKG_CONFIG_ALLOW_CROSS: 1
      PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      # Install Packaging Tools
      - name: Install Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev
          if [ "${{ matrix.arch }}" != "$(uname -m)" ]; then
            sudo dpkg --add-architecture arm64
            sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
            sudo apt-get update
            sudo apt-get install -y gcc-${{ matrix.arch }}-linux-gnu g++-aarch64-linux-gnu libasound2-dev:arm64
            rustup target add ${{ matrix.arch }}-unknown-linux-gnu
          fi
          cargo install cargo-generate-rpm cargo-deb

      - name: Build Cross (${{ matrix.arch }})
        if: matrix.arch != runner.arch
        run: cargo build --release --workspace --exclude notedeck_release --target=${{ matrix.arch }}-unknown-linux-gnu

      - name: Build Native (${{ matrix.arch }})
        if: matrix.arch == runner.arch
        run: cargo build --release --workspace --exclude notedeck_release

      - name: Create release tarball (Cross)
        if: matrix.arch != runner.arch
        run: |
          mkdir -p packages
          tar czf packages/notedeck-${{ matrix.arch }}-linux.tar.gz \
            -C target/${{ matrix.arch }}-unknown-linux-gnu/release notedeck

      - name: Create release tarball (Native)
        if: matrix.arch == runner.arch
        run: |
          mkdir -p packages
          tar czf packages/notedeck-${{ matrix.arch }}-linux.tar.gz \
            -C target/release notedeck

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: notedeck-${{ matrix.arch }}-linux.tar.gz
          path: packages/notedeck-${{ matrix.arch }}-linux.tar.gz

      - name: Build RPM (Cross)
        if: matrix.arch != runner.arch
        run: cargo generate-rpm -p crates/notedeck_chrome --target=${{ matrix.arch }}-unknown-linux-gnu

      - name: Build RPM
        if: matrix.arch == runner.arch
        run: cargo generate-rpm -p crates/notedeck_chrome

      - name: Build deb (Cross)
        if: matrix.arch != runner.arch
        run: cargo deb -p notedeck_chrome --target=${{ matrix.arch }}-unknown-linux-gnu

      - name: Build deb
        if: matrix.arch == runner.arch
        run: cargo deb -p notedeck_chrome

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        if: runner.arch == matrix.arch
        with:
          name: notedeck-${{ matrix.arch }}.rpm
          path: target/release/generate-rpm/notedeck.rpm

      - name: Upload RPM (Cross)
        uses: actions/upload-artifact@v4
        if: runner.arch != matrix.arch
        with:
          name: notedeck-${{ matrix.arch }}.rpm
          path: target/${{ matrix.arch }}-unknown-linux-gnu/generate-rpm/*.rpm

      - name: Upload deb (Native)
        uses: actions/upload-artifact@v4
        if: runner.arch == matrix.arch
        with:
          name: notedeck-${{ matrix.arch }}.deb
          path: target/release/debian/notedeck.deb

      # Upload Debian Package (Cross)
      - name: Upload deb (Cross)
        uses: actions/upload-artifact@v4
        if: runner.arch != matrix.arch
        with:
          name: notedeck-${{ matrix.arch }}.deb
          path: target/${{ matrix.arch }}-unknown-linux-gnu/debian/*.deb

  macos-dmg:
    name: macOS dmg
    runs-on: macos-latest
    needs: macos-test
    if: github.ref_name == 'master' || github.ref_name == 'ci' || github.event_name == 'release'
    env:
      NOTEDECK_APPLE_RELEASE_CERT_ID: ${{ secrets.NOTEDECK_APPLE_RELEASE_CERT_ID }}
      NOTEDECK_RELEASE_APPLE_ID: ${{ secrets.NOTEDECK_RELEASE_APPLE_ID }}
      NOTEDECK_APPLE_APP_SPECIFIC_PW: ${{ secrets.NOTEDECK_APPLE_APP_SPECIFIC_PW }}
      NOTEDECK_APPLE_TEAM_ID: ${{ secrets.NOTEDECK_APPLE_TEAM_ID }}

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Required Tools
        run: |
          brew install create-dmg
          cargo install cargo-bundle
          rustup target add ${{ matrix.arch }}-apple-darwin

      - name: Import apple codesign cert
        uses: apple-actions/import-codesign-certs@v3
        with: 
          p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
          p12-password: ${{ secrets.CERTIFICATES_P12_PASSWORD }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run macOS DMG Build Script
        run: ARCH=${{ matrix.arch }} ./scripts/macos_build.sh

      - name: Create release tarball
        run: |
          mkdir -p packages
          tar czf packages/notedeck-${{ matrix.arch }}-macos.tar.gz \
            -C target/${{ matrix.arch }}-apple-darwin/release notedeck

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: notedeck-${{ matrix.arch }}-macos.tar.gz
          path: packages/notedeck-${{ matrix.arch }}-macos.tar.gz

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: notedeck-${{ matrix.arch }}.dmg
          path: packages/notedeck-${{ matrix.arch }}.dmg

  windows-installer:
    name: Windows Installer
    runs-on: windows-latest
    needs: windows-test
    if: github.ref_name == 'master' || github.ref_name == 'ci' || github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Build cache
      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      # Create packages directory
      - name: Create packages directory
        run: mkdir packages

      # Install Inno Setup
      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      # Set up Rust toolchain
      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.arch }}-pc-windows-msvc

      # Build
      - name: Build
        shell: pwsh
        run: |
          $target = "${{ matrix.arch }}-pc-windows-msvc"
          Write-Output "Building for target: $target"
          cargo build --release --target=$target

      # Build Installer
      - name: Run Inno Setup Script
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DBuildArch=${{ matrix.arch }} "scripts\windows-installer.iss"

      # Upload the installer as an artifact
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: DamusNotedeckInstaller-${{ matrix.arch }}.exe
          path: packages\${{ matrix.arch }}\DamusNotedeckInstaller.exe

  upload-artifacts:
    name: Upload Artifacts to Server
    runs-on: ubuntu-22.04
    needs: [packaging, macos-dmg, windows-installer]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/ci' || github.event_name == 'release'

    steps:
      - name: Download all Artifacts
        uses: actions/download-artifact@v4

      - name: Setup SSH and Upload
        run: |
          eval "$(ssh-agent -s)"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SFTP_KEY }}" | tr -d '\r' | ssh-add -
          echo "${{ secrets.DEPLOY_IP }} ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEN65pj1cNMqlf96jZLr1i9+mnHIN4jjRPPTDix6sRnt" >> ~/.ssh/known_hosts
          ls -la /home/runner/work/notedeck/notedeck/notedeck-x86_64.rpm
          export ARTIFACTS=/home/runner/work/notedeck/notedeck
          sftp ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_IP }} <<EOF
          cd upload/artifacts
          put $ARTIFACTS/notedeck-x86_64.rpm/*
          put $ARTIFACTS/notedeck-x86_64.deb/*
          put $ARTIFACTS/notedeck-x86_64.dmg/*
          put $ARTIFACTS/notedeck-aarch64.rpm/*
          put $ARTIFACTS/notedeck-aarch64.deb/*
          put $ARTIFACTS/notedeck-aarch64.dmg/*
          put $ARTIFACTS/DamusNotedeckInstaller-x86_64.exe/*
          put $ARTIFACTS/DamusNotedeckInstaller-aarch64.exe/*
          put $ARTIFACTS/notedeck-x86_64-linux.tar.gz/*
          put $ARTIFACTS/notedeck-aarch64-linux.tar.gz/*
          put $ARTIFACTS/notedeck-x86_64-macos.tar.gz/*
          put $ARTIFACTS/notedeck-aarch64-macos.tar.gz/*
          bye
          EOF

  upload-to-release:
    name: Upload to GitHub Release
    runs-on: ubuntu-22.04
    needs: [packaging, macos-dmg, windows-installer]
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download all Artifacts
        uses: actions/download-artifact@v4

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          echo "=== Downloaded artifact directories ==="
          ls -la
          for dir in */; do
            echo "--- $dir ---"
            ls -la "$dir"
          done
          echo "=== Uploading to release $tag ==="
          for dir in notedeck-*.rpm notedeck-*.deb notedeck-*.dmg notedeck-*-linux.tar.gz notedeck-*-macos.tar.gz DamusNotedeckInstaller-*.exe; do
            if [ -d "$dir" ]; then
              for file in "$dir"/*; do
                [ -f "$file" ] || continue
                echo "uploading $file..."
                gh release upload "$tag" "$file" --repo "${{ github.repository }}" --clobber
              done
            fi
          done

